behaviors:
  ShipBehavior:
    trainer_type: ppo
    max_steps: 2000000
    time_horizon: 256
    summary_freq: 5000

    network_settings:
      num_layers: 2
      hidden_units: 64

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    hyperparameters:
      batch_size: 1024
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
